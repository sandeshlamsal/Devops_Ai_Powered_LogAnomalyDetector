services:
  localstack:
    build: ./localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=logs,sns,sqs
      - DEBUG=0
      - DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  emitter:
    build:
      context: .
      dockerfile: emitter/Dockerfile
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - LOG_GROUP=${LOG_GROUP:-/microservice/payment-service}
      - LOG_STREAM=${LOG_STREAM:-application}
      - EMIT_INTERVAL_SEC=${EMIT_INTERVAL_SEC:-2}
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - LOG_GROUP=${LOG_GROUP:-/microservice/payment-service}
      - LOG_STREAM=${LOG_STREAM:-application}
      - POLL_INTERVAL_SEC=${POLL_INTERVAL_SEC:-15}
      - LOG_BATCH_SIZE=${LOG_BATCH_SIZE:-20}
      - CLAUDE_MOCK=${CLAUDE_MOCK:-false}
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/anomaly-findings-watcher
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure

  watcher:
    build: ./watcher
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/anomaly-findings-watcher
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure
