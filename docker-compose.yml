services:
  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      - SERVICES=logs,sns,sqs
      - DEBUG=0
      - DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - "./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  emitter:
    build: ./emitter
    env_file: .env
    volumes:
      - "./config.yaml:/config.yaml:ro"
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - LOG_GROUP=${LOG_GROUP:-/microservice/payment-service}
      - LOG_STREAM=${LOG_STREAM:-application}
      - EMIT_INTERVAL_SEC=${EMIT_INTERVAL_SEC:-2}
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure

  agent:
    build: ./agent
    env_file: .env
    volumes:
      - "./config.yaml:/config.yaml:ro"
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - LOG_GROUP=${LOG_GROUP:-/microservice/payment-service}
      - LOG_STREAM=${LOG_STREAM:-application}
      - POLL_INTERVAL_SEC=${POLL_INTERVAL_SEC:-15}
      - LOG_BATCH_SIZE=${LOG_BATCH_SIZE:-20}
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure

  watcher:
    build: ./watcher
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ENDPOINT=http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure
